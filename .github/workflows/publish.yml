name: Publish Nuget Package
on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      
    secrets:
      NUGET_APIKEY:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Get package version
      env:
        RUN_NUMBER: ${{ github.run_number }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: >
        project_version=$(grep '<Version>' < ./${PROJECT_NAME}/${PROJECT_NAME}.csproj | sed 's/.*<Version>\(.*\)<\/Version>/\1/') &&
        echo "PROJECT_VERSION=${project_version//[$'\t\r\n']}" >> $GITHUB_ENV &&

        package_version="${project_version}-pre.${RUN_NUMBER}" &&
        echo "PACKAGE_VERSION=${package_version//[$'\t\r\n']}" >> $GITHUB_ENV
    
    - name: Create Nuget package
      env:
        PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: >
        dotnet pack ./${PROJECT_NAME}/${PROJECT_NAME}.csproj -o ./${PROJECT_NAME}/bin/Release/net9.0 -c Release -p:Version=$PACKAGE_VERSION &&
        echo "PACKAGE_FILE=${PROJECT_NAME}.${PACKAGE_VERSION}.nupkg" >> $GITHUB_ENV

    - name: Publish Nuget package
      env: 
        PACKAGE_FILE: ${{ env.PACKAGE_FILE }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: >
        cd ./${PROJECT_NAME}/bin/Release/net9.0 &&
        dotnet nuget push $PACKAGE_FILE --api-key ${{ secrets.NUGET_APIKEY }} --source https://api.nuget.org/v3/index.json
