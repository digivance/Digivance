name: PR Pipeline
on:
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get Digivance.Data version
      env:
        RUN_NUMBER: ${{ github.run_number }}
      run: >
        project_version=$(grep '<Version>' < ./Digivance.Data/Digivance.Data.csproj | sed 's/.*<Version>\(.*\)<\/Version>/\1/') &&
        package_version="${project_version}-pre.${RUN_NUMBER}" &&
        DATA_VERSION="${package_version//[$'\t\r\n']}"
        echo $DATA_VERSION
    
    - name: Display package version
      run: |
        echo ${{ env.DATA_VERSION }}
