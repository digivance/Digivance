name: PR Pipeline
on:
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

  data_deploy:
    name: Deploy Package
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Get package version
      env:
        RUN_NUMBER: ${{ github.run_number }}
      run: >
        project_version=$(grep '<Version>' < ./Digivance.Data/Digivance.Data.csproj | sed 's/.*<Version>\(.*\)<\/Version>/\1/') &&
        echo "PROJECT_VERSION=${project_version//[$'\t\r\n']}" >> $GITHUB_ENV &&

        package_version="${project_version}-pre.${RUN_NUMBER}" &&
        echo "PACKAGE_VERSION=${package_version//[$'\t\r\n']}" >> $GITHUB_ENV
    
    - name: Create Nuget package
      env:
        PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}
      run: >
        dotnet pack ./Digivance.Data/Digivance.Data.csproj -o ./bin/package -c Release -p:Version=$PACKAGE_VERSION &&
        ls ./bin/package
